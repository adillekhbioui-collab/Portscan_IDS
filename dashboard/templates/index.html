<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="AEGIS — AI-Powered Cyber Deception &amp; Threat Intelligence Dashboard">
  <title>AEGIS — Threat Operations Console</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="header" id="header">
  <div class="header__brand">
    <div class="header__logo">
      <svg viewBox="0 0 24 24"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/></svg>
    </div>
    <div>
      <div class="header__title">AEGIS</div>
      <div class="header__subtitle">Threat Operations Console</div>
    </div>
  </div>
  <div class="header__status">
    <span class="header__clock" id="clock">00:00:00</span>
    <span class="status-dot status-dot--active" id="conn-dot"></span>
    <span id="conn-label">CONNECTED</span>
  </div>
</header>

<!-- ═══ STATS BAR ═══ -->
<section class="stats-bar" id="stats-bar" aria-label="System statistics">
  <!-- Stat 1: Total Alerts -->
  <div class="stat-card" id="stat-alerts">
    <div class="stat-card__icon">
      <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <div class="stat-card__value" id="v-alerts">0</div>
    <div class="stat-card__label">Total Alerts</div>
  </div>
  <!-- Stat 2: Active Threats -->
  <div class="stat-card stat-card--danger" id="stat-threats">
    <div class="stat-card__icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    </div>
    <div class="stat-card__value" id="v-threats">0</div>
    <div class="stat-card__label">Active Threats</div>
  </div>
  <!-- Stat 3: Blocked IPs -->
  <div class="stat-card stat-card--warning" id="stat-blocked">
    <div class="stat-card__icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </div>
    <div class="stat-card__value" id="v-blocked">0</div>
    <div class="stat-card__label">Blocked IPs</div>
  </div>
  <!-- Stat 4: Honeypot Hits -->
  <div class="stat-card stat-card--info" id="stat-honeypot">
    <div class="stat-card__icon">
      <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <div class="stat-card__value" id="v-honeypot">0</div>
    <div class="stat-card__label">Honeypot Hits</div>
  </div>
  <!-- Stat 5: Avg Confidence -->
  <div class="stat-card stat-card--success" id="stat-confidence">
    <div class="stat-card__icon">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    </div>
    <div class="stat-card__value" id="v-confidence">—</div>
    <div class="stat-card__label">Avg Confidence</div>
  </div>
  <!-- Stat 6: Uptime -->
  <div class="stat-card stat-card--purple" id="stat-uptime">
    <div class="stat-card__icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </div>
    <div class="stat-card__value" id="v-uptime">0m</div>
    <div class="stat-card__label">Uptime</div>
  </div>
</section>

<!-- ═══ MAIN DASHBOARD GRID ═══ -->
<main class="dashboard-grid" id="dashboard-grid">

  <!-- Panel 1: Live Alert Feed -->
  <section class="panel" id="panel-alerts">
    <div class="panel__header">
      <div class="panel__title">
        <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/></svg>
        Live Alert Feed
      </div>
      <span class="badge badge--live">Live</span>
    </div>
    <div class="panel__body" id="alert-feed">
      <!-- Skeleton loading -->
      <div class="skeleton skeleton--card"></div>
      <div class="skeleton skeleton--card"></div>
      <div class="skeleton skeleton--card"></div>
    </div>
  </section>

  <!-- Panel 2: Port Heatmap -->
  <section class="panel" id="panel-heatmap">
    <div class="panel__header">
      <div class="panel__title">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Port Scan Heatmap
      </div>
    </div>
    <div class="panel__body" style="padding:4px;overflow:hidden">
      <div id="heatmap-container"></div>
    </div>
  </section>

  <!-- Panel 3: Active Scanners -->
  <section class="panel" id="panel-scanners">
    <div class="panel__header">
      <div class="panel__title">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Active Scanners
      </div>
      <span class="badge badge--medium" id="scanner-count">0</span>
    </div>
    <div class="panel__body" style="padding:0">
      <table class="data-table" id="scanner-table">
        <thead>
          <tr>
            <th>Source IP</th>
            <th>Type</th>
            <th>Confidence</th>
            <th>Alerts</th>
            <th>Flags</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="scanner-tbody"></tbody>
      </table>
    </div>
  </section>

  <!-- Panel 4: Threat Intelligence -->
  <section class="panel" id="panel-profile">
    <div class="panel__header">
      <div class="panel__title">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Threat Intelligence
      </div>
    </div>
    <div class="panel__body" id="profile-body">
      <div class="empty-state" id="profile-empty">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span>Select a scanner to view profile</span>
      </div>
      <div class="profile" id="profile-content" style="display:none"></div>
    </div>
  </section>

</main>

<!-- Heatmap Tooltip -->
<div class="heatmap-tooltip" id="heatmap-tooltip"></div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.0/socket.io.min.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="/static/dashboard.js"></script>
</body>
</html>
